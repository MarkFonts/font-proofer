name: Deploy to Wordmark

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Push to wordmark repo
        env:
          TOKEN: ${{ secrets.WORDMARK_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/MarkFonts/wordmark.git wordmark-repo
          rm -rf wordmark-repo/font-proofer
          cp -r dist wordmark-repo/font-proofer
          cd wordmark-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add font-proofer/
          git diff --staged --quiet || git commit -m "Deploy font-proofer"
          git push
